    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;

        }

        header {
            background-color: #ff6600;
            padding: 15px;

            text-align: left; 
            margin: 0;   
        }

        h1 {
            color: #ff6600;

            margin-bottom: 30px;

        }

        img {
            display: block;      
            margin: 20px auto;

        }

            text-align: center;

        }
